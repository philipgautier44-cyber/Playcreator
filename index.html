<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Play Creator App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            padding: 16px;
            margin: 0;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        h1 {
            margin-bottom: 8px;
            color: #333;
            font-size: 24px;
            word-break: break-word;
        }

        .subtitle {
            color: #666;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .embed-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
            width: 100%;
            overflow: hidden;
            flex: 1;
            min-height: 300px;
        }

        .embed-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 100%;
            overflow: hidden;
            border-radius: 4px;
            background: #f9f9f9;
        }

        .embed-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 4px;
        }

        /* Tablettes - écrans moyens (768px et plus) */
        @media (min-width: 768px) {
            body {
                padding: 20px;
            }
            .container {
                padding: 30px;
            }
            h1 {
                font-size: 28px;
            }
        }

        /* Grands écrans (1024px et plus) */
        @media (min-width: 1024px) {
            body {
                padding: 24px;
            }
            .container {
                padding: 40px;
            }
        }

        /* Très petits écrans (moins de 480px) */
        @media (max-width: 479px) {
            body {
                padding: 8px;
            }
            .container {
                padding: 12px;
                border-radius: 6px;
                gap: 12px;
            }
            h1 {
                font-size: 18px;
                margin-bottom: 4px;
            }
            .subtitle {
                font-size: 12px;
                margin-bottom: 12px;
            }
            .embed-wrapper {
                margin: 0;
                min-height: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Play Creator</h1>
        <p class="subtitle">Basketball Play Design Tool</p>

        <div class="embed-wrapper">
            <div class="embed-container">
                <iframe
                    allow="fullscreen"
                    title="Play Creator App"
                    src="https://www.thehoopsgeek.com/react-apps/PlayCreator/embed/?code=VpHDbkjO1U&showTitle=1&showVideo=1&showDescription=1&showPhaseDescriptions=1">
                </iframe>
            </div>
        </div>
    </div>
</body>
</html>
